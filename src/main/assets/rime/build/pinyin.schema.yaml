# Rime schema - 万象拼音极简版
# encoding: utf-8
---
schema:
  schema_id: pinyin
  name: 万象拼音
  version: "1.0"
  author:
    - amzxyz
  description: |
    万象拼音标准版，仅核心拼音输入。

speller:
  alphabet: zyxwvutsrqponmlkjihgfedcba
  delimiter: " '"

translator:
  dictionary: pinyin
  enable_completion: true
  enable_user_dict: true

punctuator:
  half_shape:
    ".": "。"
    ",": "，"

switches:
  - name: ascii_mode
    states: ["中文", "英文"]
  - name: full_shape
    states: ["半角", "全角"]
