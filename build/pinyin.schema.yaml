# 极简拼音方案 - 基于薄荷词库
__build_info:
  rime_version: 1.8.5

config_version: "ri18.03.26"

scheme:
  name: 拼音
  author: yuyansdk
  depend: []
  schema_id: pinyin

abc_segmentor:
  algebra:
    - xform/^([bcdfghjklmnpqrstwxyz])$/\1/

affix_pinyin:
  dictionary: rime_mint
  enable_completion: true
  enable_sentence: true
  initial_quality: 1

ascii_composer:
  good_old_caps_lock: true
  switch_key:
    Shift_L: commit_code
    Shift_R: commit_code

engine:
  processors:
    - ascii_composer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - affix_segmentor@affix_pinyin
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - script_translator
    - table_translator@melt_eng
  filters:
    - uniquifier

key_binder:
  bindings:
    - {accept: "Shift+space", toggle: full_shape, when: always}
    - {accept: "Control+period", toggle: ascii_punct, when: always}
    - {accept: comma, send: Page_Up, when: paging}
    - {accept: period, send: Page_Down, when: paging}
    - {accept: "Control+Shift+1", select: .next, when: always}

menu:
  page_size: 6

melt_eng:
  dictionary: melt_eng
  enable_sentence: true
  initial_quality: -1

punctuator:
  half_shape:
    ",": "，"
    ".": "。"
    "<": "《"
    ">": "》"
    "?": "？"
    ";": "；"
    ":": "："
    "'": {pair: ["'", "'"]}
    '"': {pair: ["\"", "\""]}
    "\\": "、"
    "|": "｜"
    "`": "`"
    "~": "～"

recognizer:
  patterns:
    email: "^[a-z][-_.0-9a-z]*@.*$"
    uppercase: "[A-Z][-_+.'0-9A-Za-z]*$"
    url: "^(www[.]|https?:|ftp:|mailto:).*$"

schema_list:
  - schema: pinyin

speller:
  alphabet: "zyxwvutsrqponmlkjhgfedcba`"
  delimiter: "'"
  tips: all

switches:
  - name: ascii_mode
    reset: 0
    states: ["中文", "西文"]
  - name: full_shape
    states: ["半角", "全角"]
  - name: simplification
    states: ["繁体", "简体"]
  - options: [emoji_off, emoji_suggestion]
    name: emoji_suggestion
    states: ["😊 关", "😊 开"]
